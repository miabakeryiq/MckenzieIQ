<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McKenzie's Kitchen</title>
 <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    touch-action: none;
    -webkit-overflow-scrolling: none;
    overflow: hidden;
  }

  html, body {
    width: 100%;
    height: 100%;
    max-width: 100%;
    max-height: 100%;
    position: fixed;
    top: 0;
    left: 0;
    background: #000;
    overflow: hidden;
  }

  .wrapper {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 100vh;
    height: 100vw;
    transform: translate(-50%, -50%) rotate(90deg);
    background: #000;
    overflow: hidden;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <video id="player" loop playsinline webkit-playsinline muted preload="auto">
      <source src="menu_2.mov" type="video/mp4">
    </video>
  </div>

  <script>


    const v = document.getElementById('player');

    function tryPlay() {
      v.play().catch(() => {
        document.addEventListener('click', () => v.play(), { once: true });
        document.addEventListener('touchstart', () => v.play(), { once: true });
      });
    }

    v.addEventListener('loadeddata', tryPlay);
    v.addEventListener('canplaythrough', tryPlay);
    setTimeout(tryPlay, 2000);

    // Add fullscreen here
    setTimeout(() => {
      document.documentElement.requestFullscreen && 
      document.documentElement.requestFullscreen();
    }, 1000);
    // Block all scrolling
    document.addEventListener('scroll', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
    document.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });

    // Block Fire Stick remote d-pad scrolling
  document.addEventListener('keydown', (e) => {
  if ([37,38,39,40].includes(e.keyCode)) e.preventDefault();
});
  </script>
</body>
</html>
