<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McKenzie's Kitchen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
     width: 100%;
  height: 100%;
  background: #000;
  overflow: hidden;        /* already have this */
  position: fixed;         /* ADD THIS */
  touch-action: none;      /* ADD THIS — disables scroll on Fire Stick */
    }

    .wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <video id="player" loop playsinline webkit-playsinline muted preload="auto">
      <source src="menu_2.mov" type="video/mp4">
    </video>
  </div>

  <script>


    const v = document.getElementById('player');

    function tryPlay() {
      v.play().catch(() => {
        document.addEventListener('click', () => v.play(), { once: true });
        document.addEventListener('touchstart', () => v.play(), { once: true });
      });
    }

    v.addEventListener('loadeddata', tryPlay);
    v.addEventListener('canplaythrough', tryPlay);
    setTimeout(tryPlay, 2000);

    // Add fullscreen here
    setTimeout(() => {
      document.documentElement.requestFullscreen && 
      document.documentElement.requestFullscreen();
    }, 1000);

  </script>
</body>
</html>
