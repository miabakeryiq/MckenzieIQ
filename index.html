<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Display</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: black;
        }
        video {
            width: 100%;
            height: auto;
            max-height: 100vh; /* Ensures it fits the screen height */
            transform: rotate(90deg); /* Rotates the video for portrait mode */
            transform-origin: center;
        }
    </style>
</head>
<body>
    <video controls autoplay loop>
        <source src="11.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>
</html>
