<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .wrapper {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 100vh;
      height: 100vw;
      transform: translate(-50%, -50%) rotate(90deg);
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <video id="player" loop playsinline webkit-playsinline muted preload="auto">
      <source src="menu_2.mp4" type="video/mp4">
    </video>
  </div>

  <script>
    const v = document.getElementById('player');

    // Try to play immediately
    function tryPlay() {
      v.play().catch(() => {
        // Silk sometimes needs a user gesture — tap anywhere to start
        document.addEventListener('click', () => v.play(), { once: true });
        document.addEventListener('touchstart', () => v.play(), { once: true });
      });
    }

    v.addEventListener('loadeddata', tryPlay);
    v.addEventListener('canplaythrough', tryPlay);

    // Fallback: try after 2 seconds
    setTimeout(tryPlay, 2000);

    // Log errors to title so you can see on screen
    v.addEventListener('error', () => {
      document.title = 'ERR: ' + (v.error ? v.error.code : '?');
    });
  </script>
</body>
</html>
